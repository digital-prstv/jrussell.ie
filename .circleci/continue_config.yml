# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1
orbs:
  zola: jerus-org/zola@1.2.3
  toolkit: digital-prstv/circleci-toolkit@2.12.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
parameters:
  update-infrastructure:
    type: boolean
    default: false
    description: Update the site infrastructure
  update-website:
    type: boolean
    default: false
    description: |
      Build the website using zola. 
      Copy to the internet when run on the main branch.
  validation-flag:
    type: boolean
    default: false
    description: |
      If set to true, the generate-config workflow will be triggered.
  update-changelog:
    type: boolean
    default: false
    description: |
      If set to true, the update-changelog workflow will be triggered.
  min-rust-version:
    type: string
    default: "1.81"
  fingerprint:
    type: string
    default: "SHA256:OkxsH8Z6Iim6WDJBaII9eTT9aaO1f3eDc6IpsgYYPVg"

# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows

executors:
  rust-env:
    docker:
      - image: jerusdp/ci-rust:<<pipeline.parameters.min-rust-version>>

commands:
  update_log:
    parameters:
      pcu_allow_no_pull_request:
        default: ""
        description: >-
          Optional flag to allows successful exit if no pull request in CI
          environment
        enum:
          - ""
          - "--allow-no-pull-request"
        type: enum
      pcu_allow_push_fail:
        default: ""
        description: Optional flag to allow the push to fail
        enum:
          - ""
          - "--allow-push-fail"
        type: enum
      pcu_halt_signal:
        default: halt
        description: The verbosity of the pcu command
        type: string
      pcu_verbosity:
        default: "-vv"
        description: The verbosity of the pcu command
        type: string
    steps:
      - run:
          command: |
            set -ex

            result=$(pcu <<parameters.pcu_verbosity>> pr \
              << parameters.pcu_allow_push_fail >> \
              << parameters.pcu_allow_no_pull_request >>)

            if [ "$result" == << parameters.pcu_halt_signal >> ]; then
              circleci-agent step halt
            fi
          name: Update changelog or halt step

jobs:
  update_changelog:
    executor: rust-env
    parameters:
      blog_directory:
        default: content/blog
        description: The directory to use for the blog
        type: string
      bluesky:
        default: false
        description: Whether or not to run the bluesky command
        type: boolean
      bluesky_command:
        default: draft
        description: The command to run for bluesky
        enum:
          - draft
          - post
        type: enum
      gpg_key:
        default: BOT_GPG_KEY
        description: The base64 encoded GPG key
        type: env_var_name
      gpg_trust:
        default: BOT_TRUST
        description: The trust associated with the GPG key
        type: env_var_name
      install_me:
        default: false
        description: Install the current crate as a binary
        type: boolean
      install_me_path:
        default: .
        description: The path to the crate to install
        type: string
      label_option:
        default: false
        description: Apply a label to the oldest open PR created by the specified author
        type: boolean
      min_rust_version:
        description: The minimum version of the rust compiler to use
        type: string
      pcu_allow_no_pull_request:
        default: ""
        description: >-
          Optional flag to allows successful exit if no pull request in CI
          environment
        enum:
          - ""
          - "--allow-no-pull-request"
        type: enum
      pcu_allow_push_fail:
        default: ""
        description: Optional flag to allow the push to fail
        enum:
          - ""
          - "--allow-push-fail"
        type: enum
      pcu_author:
        default: ""
        description: Custom pull request author.
        type: string
      pcu_colour:
        default: ""
        description: Custom pull request colour.
        type: string
      pcu_desc:
        default: ""
        description: Custom pull request description.
        type: string
      pcu_halt_signal:
        default: halt
        description: The verbosity of the pcu command
        type: string
      pcu_label:
        default: ""
        description: Custom pull request label.
        type: string
      pcu_push:
        default: true
        description: Optional flag to push the commit to the remote repository
        type: boolean
      pcu_explicit_push:
        default: false
        description: Optional flag for explicit push. Ensures push even if changelog not changed.
        type: boolean
      pcu_verbosity:
        default: "-vv"
        description: The verbosity of the pcu command
        type: string
      remove_ssh_key:
        default: true
        description: Remove the original SSH key from the agent
        type: boolean
      sign_key:
        default: BOT_SIGN_KEY
        description: The GPG key id associated with the GPG key
        type: env_var_name
      ssh_fingerprint:
        description: |
          The fingerprint of the ssh key to use
        type: string
      update_log_option:
        default: pipeline
        description: >-
          The option to halt or continue with new pipeline when a change log does
          not need to be updated
        enum:
          - halt
          - pipeline
        type: enum
      update_pcu:
        default: false
        description: Update pcu to the latest code from the git repo
        type: boolean
      user_email:
        default: BOT_USER_EMAIL
        description: The user email associated with the GPG key
        type: env_var_name
      user_name:
        default: BOT_USER_NAME
        description: The user name associated with the GPG key
        type: env_var_name
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - <<parameters.ssh_fingerprint>>
      - when:
          condition: << parameters.remove_ssh_key >>
          steps:
            - run:
                command: |
                  ssh-add -l
                  ssh-add -d ~/.ssh/id_rsa.pub
                  ssh-add -l
                name: Remove original SSH key from agent
      - toolkit/gpg_key
      - toolkit/git_config
      - when:
          condition: << parameters.update_pcu >>
          name: Install pcu from main branch on GitHub
          steps:
            - toolkit/install_latest_pcu
      - when:
          condition: << parameters.install_me >>
          name: Install pcu from main branch on GitHub
          steps:
            - toolkit/install_me:
                path_to_crate: << parameters.install_me_path >>
      - run:
          command: |
            pcu --version
          name: pcu version
      - when:
          condition: << parameters.bluesky >>
          steps:
            - toolkit/bsky:
                blog_directory: << parameters.blog_directory >>
                command: << parameters.bluesky_command >>
                pcu_verbosity: << parameters.pcu_verbosity >>
      - when:
          condition:
            equal:
              - halt
              - << parameters.update_log_option >>
          steps:
            - update_log:
                pcu_allow_no_pull_request: <<parameters.pcu_allow_no_pull_request>>
                pcu_allow_push_fail: <<parameters.pcu_allow_push_fail>>
                pcu_halt_signal: <<parameters.pcu_halt_signal>>
                pcu_verbosity: <<parameters.pcu_verbosity>>
      - when:
          condition:
            equal:
              - true
              - << parameters.label_option >>
          steps:
            - toolkit/label_pr:
                pcu_author: <<parameters.pcu_author>>
                pcu_colour: <<parameters.pcu_colour>>
                pcu_desc: <<parameters.pcu_desc>>
                pcu_label: <<parameters.pcu_label>>
                pcu_verbosity: <<parameters.pcu_verbosity>>
      - when:
          condition:
            equal:
              - pipeline
              - << parameters.update_log_option >>
          steps:
            - toolkit/pipeline_pcu_check:
                pcu_halt_signal: <<parameters.pcu_halt_signal>>
                pcu_push: <<parameters.pcu_push>>
                pcu_verbosity: <<parameters.pcu_verbosity>>
      - when:
          condition:
            equal:
              - true
              - << parameters.pcu_explicit_push >>
          steps:
            - toolkit/push_cmd:
                pcu_verbosity: <<parameters.pcu_verbosity>>
      - when:
          condition:
            and:
              - not: << parameters.pcu_push >>
              - not: << parameters.pcu_explicit_push >>
          steps:
            - run:
                command: |
                  set -ex

                  mkdir -p /tmp/workspace
                  cp CHANGELOG.md /tmp/workspace/CHANGELOG.md
                name: Save CHANGELOG.md to workspace
            - persist_to_workspace:
                paths:
                  - CHANGELOG.md
                root: /tmp/workspace

workflows:
  build_website:
    when: << pipeline.parameters.update-website >>
    jobs:
      - zola/build:
          zola_version: 0.19.2
          list_directory: true
          check_links: false
          pre-steps:
            - attach_workspace:
                at: /home/circleci/
          post-steps:
            - persist_to_workspace:
                root: /home/circleci/
                paths:
                  - project/public

      - update_changelog:
          filters:
            branches:
              ignore: main
          requires:
            - zola/build
          context:
            - release
            - bot-check
            - pcu-app
          ssh_fingerprint: << pipeline.parameters.fingerprint >>
          min_rust_version: << pipeline.parameters.min-rust-version >>
          bluesky: true
          bluesky_command: "draft"
          blog_directory: "content/blog"
          update_pcu: true
          pcu_verbosity: "-vvv"
          pcu_push: false
          pcu_explicit_push: true

  update_changelog_only:
    when:
      and:
        - << pipeline.parameters.update-changelog >>
        - not: << pipeline.parameters.update-website >>
    jobs:
      - toolkit/update_changelog:
          filters:
            branches:
              ignore: main
          context:
            - release
            - bot-check
            - pcu-app
          ssh_fingerprint: << pipeline.parameters.fingerprint >>
          min_rust_version: << pipeline.parameters.min-rust-version >>
      - toolkit/end_success:
          message: "Changelog update already completed in PR."
          filters:
            branches:
              only: main
