version: 2.1

orbs:
  zola: jerus-org/zola@1.3.1
  toolkit: digital-prstv/circleci-toolkit@6.6.1

jobs:
  bluesky_draft:
    executor: toolkit/base_env
    steps:
      - checkout
      - toolkit/gpg_key
      - toolkit/git_config
      - toolkit/bsky:
          command: draft
          allow_empty: true

  linkedin_draft:
    executor: toolkit/base_env
    steps:
      - checkout
      - toolkit/gpg_key
      - toolkit/git_config
      - run:
          name: Sync with remote (pick up bluesky_draft push)
          command: git pull --rebase origin "$CIRCLE_BRANCH"
      - toolkit/lnkd:
          subcommand: draft
          allow_empty: true

workflows:
  validation:
    jobs:
      # Website build — validate on PR branches
      - zola/build:
          zola_version: 0.19.2
          list_directory: true
          check_links: false

      # Bluesky draft — create draft posts for new blog entries
      - bluesky_draft:
          context:
            - release
            - bot-check
            - pcu-app
            - bluesky
          requires:
            - zola/build
          filters:
            branches:
              ignore: [main]

      # LinkedIn draft — stage LinkedIn posts for new blog entries.
      # Runs sequentially after bluesky_draft; rebases to pick up any push
      # from bluesky_draft before committing.
      - linkedin_draft:
          context:
            - release
            - bot-check
            - pcu-app
          requires:
            - bluesky_draft
          filters:
            branches:
              ignore: [main]
