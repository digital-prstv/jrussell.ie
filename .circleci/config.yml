# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1
orbs:
  terraform: circleci/terraform@3.0.0
# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  01-remote-plan:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/01-remote
            backend_config_file: ../remote.config

  01-remote-apply:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/01-remote
            backend_config_file: ../remote.config

  10-static-plan:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/10-static
            backend_config_file: ../remote.config

  10-static-apply:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/10-static
            backend_config_file: ../remote.config

  20-network-plan:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/20-network
            backend_config_file: ../remote.config

  20-network-apply:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/20-network
            backend_config_file: ../remote.config

  21-site-cert-plan:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/21-site-cert
            backend_config_file: ../remote.config

  21-site-cert-apply:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/21-site-cert
            backend_config_file: ../remote.config

  30-edge-plan:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/30-edge
            backend_config_file: ../remote.config

  30-edge-apply:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/30-edge
            backend_config_file: ../remote.config

# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  iac-deployment:
    jobs:
      - 01-remote-plan:
          context:
            - AWS_DEV
      - 10-static-plan:
          context:
            - AWS_DEV
      - 20-network-plan:
          context:
            - AWS_DEV
      - 21-site-cert-plan:
          context:
            - AWS_DEV
      - 30-edge-plan:
          context:
            - AWS_DEV
      - approve:
          type: approval
          requires:
            - 01-remote-plan
            - 10-static-plan
            - 20-network-plan
            - 21-site-cert-plan
            - 30-edge-plan
      - 01-remote-apply:
          context:
            - AWS_DEV
          # requires:
            # - approve
      - 10-static-apply:
          context:
            - AWS_DEV
          requires:
          #   - approve
            - 01-remote-apply
      - 20-network-apply:
          context:
            - AWS_DEV
          requires:
          #   - approve
            - 01-remote-apply
      - 21-site-cert-apply:
          context:
            - AWS_DEV
          requires:
          #   - approve
            - 01-remote-apply
            - 20-network-apply
      - 30-edge-apply:
          context:
            - AWS_DEV
          requires:
          #   - approve
            - 10-static-apply
            - 20-network-apply
            - 21-network-apply
