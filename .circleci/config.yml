version: 2.1
setup: true
orbs:
  path-filtering: circleci/path-filtering@1.2.0
  # zola: jerus-org/zola@1.1.0
  toolkit: digital-prstv/circleci-toolkit@2.0.0
  aws-cli: circleci/aws-cli@5.1.2
parameters:
  success-flag:
    type: boolean
    default: false
    description: |
      If set to true, the success workflow will be triggered.
  validation-flag:
    type: boolean
    default: false
    description: |
      If set to true, the generate-config workflow will be triggered.
  release-website:
    type: boolean
    default: false
    description: |
      If set to true, the release-website workflow will be triggered.
  min-rust-version:
    type: string
    default: "1.81"
  fingerprint:
    type: string
    default: "SHA256:OkxsH8Z6Iim6WDJBaII9eTT9aaO1f3eDc6IpsgYYPVg"

jobs:
  build:
    description: >
      Build public site using zola.

    docker:
      - image: jerusdp/ci-zola:0.19.2

    parameters:
      zola_version:
        type: string
        description: "The of zola to use"
      update_submodules:
        type: boolean
        default: true
        description: "If true, the git submodules will be updated."
      list_directory:
        type: boolean
        default: false
        description: "If true, list the directory after the update."
      output_directory:
        type: string
        default: ""
        description: "If true, list the directory after the update."

    steps:
      - checkout

      - when:
          condition: << parameters.update_submodules >>
          steps:
            - run:
                name: Sync git submodules
                command: |
                  git submodule sync

            - run:
                name: Update git submodules
                command: |
                  git submodule update --init

      - run:
          name: Confirm zola version
          command: |
            zola --version

      - run:
          name: Build site
          command: |
            if [[ "" != << parameters.output_directory >> ]]; then
              zola build --output-dir /tmp/workspace/public
            else 
              zola build
            fi

      - when:
          condition: << parameters.list_directory >>
          steps:
            - run:
                name: List directory contents
                command: |
                  pwd
                  ls -la

  update_site:
    executor: aws-cli/default

    steps:
      - aws-cli/setup:
          role_arn: arn:aws:iam::086010417807:role/CircleCI-Digital-PRSTV
          region: eu-west-1
      - run: # Deploy to S3 using the sync command
          name: Deploy to S3
          command: aws s3 sync --delete /tmp/workspace/public s3://www.jrussell.ie

  # authorise_aws:
  #   executor: aws-cli/default
  #   steps:
  #     - checkout
  #     - aws-cli/setup:
  #         role_arn: arn:aws:iam::086010417807:role/CircleCI-Digital-PRSTV
  #         region: eu-west-1

workflows:
  check_last_commit:
    when:
      and:
        - not: << pipeline.parameters.success-flag >>
        - not: << pipeline.parameters.validation-flag >>
        - not: << pipeline.parameters.release-website >>

    jobs:
      - toolkit/choose_pipeline:
          name: choose pipeline based on committer
          context: bot-check

  generate-config:
    when:
      and:
        - not: << pipeline.parameters.success-flag >>
        - << pipeline.parameters.validation-flag >>
        - not: << pipeline.parameters.release-website >>

    jobs:
      - path-filtering/filter:
          base-revision: main
          config-path: .circleci/continue_config.yml
          mapping: |
            iac/.* update-infrastructure true
            content/.* update-website true
            sass/.* update-website true
            static/.* update-website true
            templates/.* update-website true
            syntaxes/.* update-website true
            themes/.* update-website true
            .circleci/.* update-changelog true

  on_success:
    when:
      and:
        - << pipeline.parameters.success-flag >>
        - not: << pipeline.parameters.validation-flag >>
        - not: << pipeline.parameters.release-website >>

    jobs:
      - toolkit/end_success

  release_website:
    when:
      and:
        - not: << pipeline.parameters.success-flag >>
        - not: << pipeline.parameters.validation-flag >>
        - << pipeline.parameters.release-website >>

    jobs:
      # - authorise_aws:
      #     pre-steps:
      #       - attach_workspace:
      #           at: /home/circleci/
      #     post-steps:
      #       - persist_to_workspace:
      #           root: /home/circleci/
      #           paths:
      #             - .aws
      - build:
          # requires:
          #   - authorise_aws
          zola_version: 0.19.2
          list_directory: true
          pre-steps:
            - attach_workspace:
                at: /tmp/workspace
          post-steps:
            - persist_to_workspace:
                root: /tmp/workspace
                paths:
                  - public

      - update_site:
          context:
            - AWS-DEV
          requires:
            # - zola/build
            - build
          pre-steps:
            - attach_workspace:
                at: /home/circleci/

      - toolkit/save_next_version:
          requires:
            - update_site
          min_rust_version: << pipeline.parameters.min-rust-version >>
          version: 1.0.0

      - toolkit/make_release:
          name: website github release
          context:
            - release
            - bot-check
          requires:
            - toolkit/save_next_version
          ssh_fingerprint: << pipeline.parameters.fingerprint >>
          min_rust_version: << pipeline.parameters.min-rust-version >>
          when_cargo_release: false
          pcu_update_changelog: true
      - toolkit/no_release:
          min_rust_version: << pipeline.parameters.min-rust-version >>
          requires:
            - toolkit/save_next_version:
                - failed
