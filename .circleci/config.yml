version: 2.1

orbs:
  zola: jerus-org/zola@1.3.1
  toolkit: digital-prstv/circleci-toolkit@6.0.0
  aws-cli: circleci/aws-cli@5.4.1
  terraform: circleci/terraform@3.7.0

jobs:
  authorise_aws:
    executor: aws-cli/default
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: arn:aws:iam::086010417807:role/CircleCI-Digital-PRSTV
          region: eu-west-1
      - persist_to_workspace:
          root: /home/circleci/
          paths:
            - .aws

  plan-01-remote:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/01-remote
          backend_config_file: ../remote.config

  plan-10-static:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/10-static
          backend_config_file: ../remote.config

  plan-20-network:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/20-network
          backend_config_file: ../remote.config

  plan-21-site-cert:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/21-site-cert
          backend_config_file: ../remote.config

  plan-22-sec-headers:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/22-sec-headers
          backend_config_file: ../remote.config

  plan-30-edge:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/30-edge
          backend_config_file: ../remote.config

  bluesky_draft:
    executor: toolkit/base_env
    steps:
      - checkout
      - run:
          name: Create bluesky drafts for new blog posts
          command: pcu -vv bsky draft --allow-empty content/blog
      - run:
          name: Push drafts to remote if any were created
          command: |
            if git diff --quiet HEAD "origin/${CIRCLE_BRANCH}"; then
              echo "No new commits — skipping push"
            else
              pcu -vv push
            fi

workflows:
  validation:
    when:
      and:
        - not:
            equal: [scheduled_pipeline, << pipeline.trigger_source >>]
        - not:
            equal: [main, << pipeline.git.branch >>]
    jobs:
      # Website builds — validate on PR branches
      - zola/build:
          zola_version: 0.19.2
          list_directory: true
          check_links: false

      - zola/build:
          name: build-company
          zola_version: 0.19.2
          config: config.jerusdataprotection.toml
          check_links: false

      # Bluesky draft — create draft posts for new blog entries
      - bluesky_draft:
          context:
            - release
            - bot-check
            - pcu-app
            - bluesky
          requires:
            - zola/build

      # IaC validation — Terraform plans in parallel on PR branches
      - authorise_aws:
          context:
            - AWS-DEV

      - plan-01-remote:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - plan-10-static:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - plan-20-network:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - plan-21-site-cert:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - plan-22-sec-headers:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - plan-30-edge:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
