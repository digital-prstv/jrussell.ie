# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1
orbs:
  terraform: circleci/terraform@3.0.0
  # jq: circleci/jq@2.2.0
# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  plan-backend-store:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/01-remote
            backend_config_file: ../remote.config

  apply-backend-store:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/01-remote
            backend_config_file: ../remote.config

  plan-10-static:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/10-static
            backend_config_file: ../remote.config

  apply-10-static:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/10-static
            backend_config_file: ../remote.config

# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  setup-backend-store:
    jobs:
      - plan-backend-store:
          context:
            - AWS_DEV
      - approve:
          type: approval
          requires:
            - plan-backend-store
      - apply-backend-store:
          context:
            - AWS_DEV
          requires:
            - approve

iac-10-static:
    jobs:
      - plan-10-static:
          context:
            - AWS_DEV
      - approve:
          type: approval
          requires:
            - plan-10-static
      - apply-10-static:
          context:
            - AWS_DEV
          requires:
            - approve
