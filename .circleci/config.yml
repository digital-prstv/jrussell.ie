# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1
orbs:
  terraform: circleci/terraform@3.0.0
  aws-s3: circleci/aws-s3@3.0.0
# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  plan-01-remote:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/01-remote
            backend_config_file: ../remote.config

  apply-01-remote:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/01-remote
            backend_config_file: ../remote.config

  plan-10-static:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/10-static
            backend_config_file: ../remote.config

  apply-10-static:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/10-static
            backend_config_file: ../remote.config

  plan-20-network:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/20-network
            backend_config_file: ../remote.config

  apply-20-network:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/20-network
            backend_config_file: ../remote.config

  plan-21-site-cert:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/21-site-cert
            backend_config_file: ../remote.config

  apply-21-site-cert:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/21-site-cert
            backend_config_file: ../remote.config

  plan-30-edge:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/plan:
            path: ./iac/30-edge
            backend_config_file: ../remote.config

  apply-30-edge:
      docker:
        - image: cimg/base:2021.10
      executor: terraform/default
      steps:
        - checkout
        - terraform/install
        - terraform/apply:
            path: ./iac/30-edge
            backend_config_file: ../remote.config

  update-site:
      docker:
        - image: jerusdp/site:0.0.2
      steps:
        - checkout
        - run: git submodule sync
        - run: git submodule update --init
        - run: zola build
        - aws-s3/sync:
            arguments: --delete
            from: public
            to: 's3://www.jrussell.ie'
# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  iac-deployment:
    jobs:
      - plan-01-remote:
          context:
            - AWS_DEV
      - plan-10-static:
          context:
            - AWS_DEV
      - plan-20-network:
          context:
            - AWS_DEV
      - plan-21-site-cert:
          context:
            - AWS_DEV
      - plan-30-edge:
          context:
            - AWS_DEV
      - approve:
          type: approval
          requires:
            - plan-01-remote
            - plan-10-static
            - plan-20-network
            - plan-21-site-cert
            - plan-30-edge
      - apply-01-remote:
          context:
            - AWS_DEV
          requires:
            - approve
      - apply-10-static:
          context:
            - AWS_DEV
          requires:
            - approve
            - apply-01-remote
      - apply-20-network:
          context:
            - AWS_DEV
          requires:
            - approve
            - apply-01-remote
      - apply-21-site-cert:
          context:
            - AWS_DEV
          requires:
            - approve
            - apply-01-remote
            - apply-20-network
      - apply-30-edge:
          context:
            - AWS_DEV
          requires:
            - approve
            - apply-10-static
            - apply-20-network
            - apply-21-site-cert
      - update-site:
          context:
            - AWS_DEV