  #         root: /home/circleci/
  #         paths:
  #           - project/public
  #           - .aws

  update-site:
    docker:
      - image: jerusdp/site:0.0.2
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - run: # Deploy to S3 using the sync command
          name: Deploy to S3
          command: aws s3 sync --delete public s3://www.jrussell.ie
# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  iac-deployment:
    jobs:
      - authorise_aws
      - plan-01-remote:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - plan-10-static:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - plan-20-network:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - plan-21-site-cert:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - plan-22-sec-headers:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - plan-30-edge:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - apply-01-remote:
          context:
            - AWS-DEV
          requires:
            - plan-01-remote
            - plan-10-static
            - plan-20-network
            - plan-21-site-cert
            - plan-22-sec-headers
            - plan-30-edge
      - apply-10-static:
          context:
            - AWS-DEV
          requires:
            - apply-01-remote
      - apply-20-network:
          context:
            - AWS-DEV
          requires:
            - apply-01-remote
      - apply-21-site-cert:
          context:
            - AWS-DEV
          requires:
            - apply-20-network
      - apply-22-sec-headers:
          context:
            - AWS-DEV
          requires:
            - apply-01-remote
      - apply-30-edge:
          context:
            - AWS-DEV
          requires:
            - apply-10-static
            - apply-21-site-cert
            - apply-22-sec-headers
      - zola/build:
          zola_version: 0.19.2
          requires:
            - apply-30-edge
          pre-steps:
            - attach_workspace:
                at: /home/circleci/
          post-steps:
            - persist_to_workspace:
                root: /home/circleci/
                paths:
                  - project/public
                  - .aws

      - update-site:
          context:
            - AWS-DEV
          requires:
            - zola/build
          filters:
            branches:
              only: main
