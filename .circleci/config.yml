version: 2.1
setup: true
orbs:
  path-filtering: circleci/path-filtering@1.2.0
  circleci-cli: circleci/circleci-cli@0.1.9
  continuation: circleci/continuation@1.1.0
  zola: jerus-org/zola@1.2.3
  toolkit: digital-prstv/circleci-toolkit@2.0.4
  aws-cli: circleci/aws-cli@5.2.0
  terraform: circleci/terraform@3.5.1
parameters:
  success-flag:
    type: boolean
    default: false
    description: |
      If set to true, the success workflow will be triggered.
  validation-flag:
    type: boolean
    default: false
    description: |
      If set to true, the generate-config workflow will be triggered.
  release-website:
    type: boolean
    default: false
    description: |
      If set to true, the release-website workflow will be triggered.
  release-iac:
    type: boolean
    default: false
    description: |
      If set to true, the release-iac workflow will be triggered.
  min-rust-version:
    type: string
    default: "1.81"
  fingerprint:
    type: string
    default: "SHA256:OkxsH8Z6Iim6WDJBaII9eTT9aaO1f3eDc6IpsgYYPVg"

jobs:
  setup:
    executor: path-filtering/default
    steps:
      - checkout
      - circleci-cli/install
      - circleci-cli/setup
      - path-filtering/set-parameters:
          base-revision: main
          config-path: .circleci/continue_no_updates.yml
          mapping: |
            iac/.* update-infrastructure true .circleci/continue_iac.yml
            content/.* update-website true .circleci/continue_website.yml
            sass/.* update-website true .circleci/continue_website.yml
            static/.* update-website true .circleci/continue_website.yml
            templates/.* update-website true .circleci/continue_website.yml
            syntaxes/.* update-website true .circleci/continue_website.yml
            themes/.* update-website true .circleci/continue_website.yml
            config.toml update-website true .circleci/continue_website.yml
            .circleci/.* update-changelog true .circleci/continue_changelog.yml
            justfile update-changelog true .circleci/continue_changelog.yml
            README.md update-changelog true .circleci/continue_changelog.yml
            renovate.json update-changelog true .circleci/continue_changelog.yml
      - path-filtering/generate-config
      - run:
          name: validate config
          command: circleci config validate --org-slug github/digital-prstv --token $CIRCLE_TOKEN /tmp/generated-config.yml
      - continuation/continue:
          configuration_path: /tmp/generated-config.yml

  update_site:
    executor: aws-cli/default

    steps:
      - aws-cli/setup:
          role_arn: arn:aws:iam::086010417807:role/CircleCI-Digital-PRSTV
          region: eu-west-1
      - run: # Deploy to S3 using the sync command
          name: Deploy to S3
          command: aws s3 sync --delete /tmp/workspace/public s3://www.jrussell.ie
  authorise_aws:
    docker:
      - image: cimg/base:2025.02
    executor: aws-cli/default
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: arn:aws:iam::086010417807:role/CircleCI-Digital-PRSTV
          region: eu-west-1
      - persist_to_workspace:
          root: /home/circleci/
          paths:
            - .aws
  plan-01-remote:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/01-remote
          backend_config_file: ../remote.config

  apply-01-remote:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/apply:
          path: ./iac/01-remote
          backend_config_file: ../remote.config

  plan-10-static:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/10-static
          backend_config_file: ../remote.config

  apply-10-static:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/apply:
          path: ./iac/10-static
          backend_config_file: ../remote.config

  plan-20-network:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/20-network
          backend_config_file: ../remote.config

  apply-20-network:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/apply:
          path: ./iac/20-network
          backend_config_file: ../remote.config

  plan-21-site-cert:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/21-site-cert
          backend_config_file: ../remote.config

  apply-21-site-cert:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/apply:
          path: ./iac/21-site-cert
          backend_config_file: ../remote.config

  plan-22-sec-headers:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/22-sec-headers
          backend_config_file: ../remote.config

  apply-22-sec-headers:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - run: zip -j ./iac/22-sec-headers/javascript.zip ./iac/22-sec-headers/index.js
      - terraform/apply:
          path: ./iac/22-sec-headers
          backend_config_file: ../remote.config

  plan-30-edge:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/30-edge
          backend_config_file: ../remote.config

  apply-30-edge:
    docker:
      - image: cimg/base:2025.02
    executor: terraform/default
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/apply:
          path: ./iac/30-edge
          backend_config_file: ../remote.config

workflows:
  check_last_commit:
    when:
      and:
        - not: << pipeline.parameters.success-flag >>
        - not: << pipeline.parameters.validation-flag >>
        - not: << pipeline.parameters.release-website >>
        - not: << pipeline.parameters.release-iac >>

    jobs:
      - toolkit/choose_pipeline:
          name: choose pipeline based on committer
          context: bot-check

  setup-workflow:
    when:
      and:
        - not: << pipeline.parameters.success-flag >>
        - << pipeline.parameters.validation-flag >>
        - not: << pipeline.parameters.release-website >>
        - not: << pipeline.parameters.release-iac >>
    jobs:
      - setup:
            context:
              - circleci-api

  on_success:
    when:
      and:
        - << pipeline.parameters.success-flag >>
        - not: << pipeline.parameters.validation-flag >>
        - not: << pipeline.parameters.release-website >>
        - not: << pipeline.parameters.release-iac >>

    jobs:
      - toolkit/end_success

  release_website:
    when:
      and:
        - not: << pipeline.parameters.success-flag >>
        - not: << pipeline.parameters.validation-flag >>
        - << pipeline.parameters.release-website >>
        - not: << pipeline.parameters.release-iac >>

    jobs:
      - zola/build:
          zola_version: 0.19.2
          list_directory: true
          check_links: false
          output_dir: /tmp/workspace/public
          pre-steps:
            - attach_workspace:
                at: /tmp/workspace
          post-steps:
            - persist_to_workspace:
                root: /tmp/workspace
                paths:
                  - public

      - update_site:
          context:
            - AWS-DEV
          requires:
            - zola/build
          pre-steps:
            - attach_workspace:
                at: /tmp/workspace

      - toolkit/save_next_version:
          requires:
            - update_site
          min_rust_version: << pipeline.parameters.min-rust-version >>

      - toolkit/make_release:
          name: website github release
          context:
            - release
            - bot-check
          requires:
            - toolkit/save_next_version
          ssh_fingerprint: << pipeline.parameters.fingerprint >>
          min_rust_version: << pipeline.parameters.min-rust-version >>
          when_cargo_release: false
          pcu_update_changelog: true
      - toolkit/no_release:
          min_rust_version: << pipeline.parameters.min-rust-version >>
          requires:
            - toolkit/save_next_version:
                - failed

  release_iac:
    when:
      and:
        - not: << pipeline.parameters.success-flag >>
        - not: << pipeline.parameters.validation-flag >>
        - not: << pipeline.parameters.release-website >>
        - << pipeline.parameters.release-iac >>

    jobs:
      - authorise_aws
      - plan-01-remote:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - plan-10-static:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - plan-20-network:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - plan-21-site-cert:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - plan-22-sec-headers:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - plan-30-edge:
          context:
            - AWS-DEV
          requires:
            - authorise_aws
      - apply-01-remote:
          context:
            - AWS-DEV
          requires:
            - plan-01-remote
            - plan-10-static
            - plan-20-network
            - plan-21-site-cert
            - plan-22-sec-headers
            - plan-30-edge
      - apply-10-static:
          context:
            - AWS-DEV
          requires:
            - apply-01-remote
      - apply-20-network:
          context:
            - AWS-DEV
          requires:
            - apply-01-remote
      - apply-21-site-cert:
          context:
            - AWS-DEV
          requires:
            - apply-20-network
      - apply-22-sec-headers:
          context:
            - AWS-DEV
          requires:
            - apply-01-remote
      - apply-30-edge:
          context:
            - AWS-DEV
          requires:
            - apply-10-static
            - apply-21-site-cert
            - apply-22-sec-headers
      - toolkit/update_changelog:
          branches:
            ignore: main
          requires:
            - apply-30-edge
          context:
            - release
            - bot-check
            - pcu-app
          ssh_fingerprint: << pipeline.parameters.fingerprint >>
          min_rust_version: << pipeline.parameters.min-rust-version >>

      - toolkit/save_next_version:
          requires:
            - apply-30-edge
          min_rust_version: << pipeline.parameters.min-rust-version >>

      - toolkit/make_release:
          name: website github release
          context:
            - release
            - bot-check
          requires:
            - toolkit/save_next_version
          ssh_fingerprint: << pipeline.parameters.fingerprint >>
          min_rust_version: << pipeline.parameters.min-rust-version >>
          when_cargo_release: false
          pcu_update_changelog: true
      - toolkit/no_release:
          min_rust_version: << pipeline.parameters.min-rust-version >>
          requires:
            - toolkit/save_next_version:
                - failed
