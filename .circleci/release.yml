version: 2.1

parameters:
  workspace_version:
    type: string
    default: ""
    description: "Override workspace v* version (empty = nextsv auto-detect)"

orbs:
  toolkit: digital-prstv/circleci-toolkit@6.3.0
  zola: jerus-org/zola@1.3.1
  aws-cli: circleci/aws-cli@5.4.1

jobs:
  update_site:
    executor: aws-cli/default
    steps:
      - aws-cli/setup:
          region: eu-west-1
          role_arn: ${AWS_ROLE_ARN}
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Deploy to S3
          command: aws s3 sync --delete /tmp/workspace/public s3://www.jrussell.ie

  update_company_site:
    executor: aws-cli/default
    steps:
      - aws-cli/setup:
          region: eu-west-1
          role_arn: ${AWS_ROLE_ARN}
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Deploy to company S3
          command: aws s3 sync --delete /tmp/workspace/public-company s3://www.jerusdataprotection.ie

workflows:
  release:
    jobs:
      - toolkit/calculate_versions:
          name: calculate-versions
          crates: ""
          workspace_version_override: << pipeline.parameters.workspace_version >>

      - approve-release:
          type: approval
          requires:
            - calculate-versions

      - toolkit/release_prlog:
          requires:
            - approve-release
          context:
            - release
            - bot-check
            - pcu-app

      # Build and deploy both sites in parallel after release tag is created
      - zola/build:
          name: build-website
          zola_version: 0.19.2
          list_directory: true
          check_links: false
          output_dir: /tmp/workspace/public
          post-steps:
            - persist_to_workspace:
                root: /tmp/workspace
                paths:
                  - public
          requires:
            - toolkit/release_prlog

      - update_site:
          context:
            - AWS-DEV
          requires:
            - build-website

      - zola/build:
          name: build-company
          zola_version: 0.19.2
          config: config.jerusdataprotection.toml
          check_links: false
          output_dir: /tmp/workspace/public-company
          post-steps:
            - persist_to_workspace:
                root: /tmp/workspace
                paths:
                  - public-company
          requires:
            - toolkit/release_prlog

      - update_company_site:
          context:
            - AWS-COMPANY
          requires:
            - build-company

      # Social posting — sequential: bluesky first, linkedin after.
      # bluesky_post pushes its deletion commit; linkedin_post rebases to pick
      # it up before pushing its own commit.
      - toolkit/bluesky_post:
          context:
            - release
            - bot-check
            - pcu-app
            - bluesky
          requires:
            - toolkit/release_prlog

      - toolkit/linkedin_post:
          pcu_verbosity: "-vvv"
          pre-steps:
            - run:
                name: Enable gen_linkedin debug logging
                command: echo 'export RUST_LOG=gen_linkedin=debug' >> "$BASH_ENV"
          context:
            - release
            - bot-check
            - pcu-app
            - linkedin
          requires:
            - toolkit/bluesky_post
