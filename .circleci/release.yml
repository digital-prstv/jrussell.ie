version: 2.1

parameters:
  workspace_version:
    type: string
    default: ""
    description: "Override workspace v* version (empty = nextsv auto-detect)"

orbs:
  toolkit: digital-prstv/circleci-toolkit@6.1.4
  zola: jerus-org/zola@1.3.1
  aws-cli: circleci/aws-cli@5.4.1

jobs:
  update_site:
    executor: aws-cli/default
    steps:
      - aws-cli/setup:
          region: eu-west-1
          role_arn: ${AWS_ROLE_ARN}
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Deploy to S3
          command: aws s3 sync --delete /tmp/workspace/public s3://www.jrussell.ie

  update_company_site:
    executor: aws-cli/default
    steps:
      - aws-cli/setup:
          region: eu-west-1
          role_arn: ${AWS_ROLE_ARN}
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Deploy to company S3
          command: aws s3 sync --delete /tmp/workspace/public-company s3://www.jerusdataprotection.ie

  bluesky_post:
    executor: toolkit/base_env
    steps:
      - checkout
      - toolkit/bsky:
          command: post
          blog_directory: content/blog

workflows:
  release:
    jobs:
      - toolkit/calculate_versions:
          name: calculate-versions
          crates: ""
          workspace_version_override: << pipeline.parameters.workspace_version >>

      - approve-release:
          type: approval
          requires:
            - calculate-versions

      - toolkit/release_prlog:
          requires:
            - approve-release
          context:
            - release
            - bot-check
            - pcu-app

      # Build and deploy both sites in parallel after release tag is created
      - zola/build:
          name: build-website
          zola_version: 0.19.2
          list_directory: true
          check_links: false
          output_dir: /tmp/workspace/public
          post-steps:
            - persist_to_workspace:
                root: /tmp/workspace
                paths:
                  - public
          requires:
            - toolkit/release_prlog

      - update_site:
          context:
            - AWS-DEV
          requires:
            - build-website

      - zola/build:
          name: build-company
          zola_version: 0.19.2
          config: config.jerusdataprotection.toml
          check_links: false
          output_dir: /tmp/workspace/public-company
          post-steps:
            - persist_to_workspace:
                root: /tmp/workspace
                paths:
                  - public-company
          requires:
            - toolkit/release_prlog

      - update_company_site:
          context:
            - AWS-COMPANY
          requires:
            - build-company

      - bluesky_post:
          context:
            - bluesky
          requires:
            - toolkit/release_prlog

