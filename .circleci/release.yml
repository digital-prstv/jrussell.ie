version: 2.1

parameters:
  workspace_version:
    type: string
    default: ""
    description: "Override workspace v* version (empty = nextsv auto-detect)"

orbs:
  toolkit: digital-prstv/circleci-toolkit@6.6.1
  zola: jerus-org/zola@1.3.1

workflows:
  release:
    jobs:
      - toolkit/calculate_versions:
          name: calculate-versions
          crates: ""
          workspace_version_override: << pipeline.parameters.workspace_version >>

      - approve-release:
          type: approval
          requires:
            - calculate-versions

      - toolkit/release_prlog:
          requires:
            - approve-release
          context:
            - release
            - bot-check
            - pcu-app

      # Site build+deploy is handled by GitHub Actions (.github/workflows/pages.yml)
      # on push to main; live serving is GitHub Pages + Cloudflare. CircleCI
      # retains version/PRLOG/social responsibilities only.

      # Social posting — sequential: bluesky first, linkedin after.
      # bluesky_post pushes its deletion commit; linkedin_post rebases to pick
      # it up before pushing its own commit.
      - toolkit/bluesky_post:
          context:
            - release
            - bot-check
            - pcu-app
            - bluesky
          requires:
            - toolkit/release_prlog

      - toolkit/linkedin_post:
          pcu_verbosity: "-vvv"
          pre-steps:
            - run:
                name: Enable gen_linkedin debug logging
                command: echo 'export RUST_LOG=gen_linkedin=debug' >> "$BASH_ENV"
          context:
            - release
            - bot-check
            - pcu-app
            - linkedin
          requires:
            - toolkit/bluesky_post
