version: 2.1

parameters:
  update_pcu:
    type: boolean
    default: false
    description: "If true, pcu is updated from its main github branch before running."

orbs:
  toolkit: digital-prstv/circleci-toolkit@6.0.0

jobs:
  check_iac_changes:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Switch to main
          command: |
            git fetch origin main
            git checkout main
      - run:
          name: Detect IaC changes — trigger deploy pipeline if found
          command: |
            set -eo pipefail
            if git diff HEAD^ HEAD -- iac/ | grep -q .; then
              echo "IaC changes detected — triggering deploy pipeline"
              curl -s -X POST \
                "https://circleci.com/api/v2/pipeline" \
                -H "Circle-Token: ${CIRCLE_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"definition_id": "a18ece2d-9fcd-4444-a115-2eb4bd706be5", "branch": "main", "parameters": {"deploy-iac": true}}'
            else
              echo "No IaC changes — skipping deploy"
            fi

workflows:
  update_prlog:
    jobs:
      - toolkit/update_prlog:
          name: update-prlog-on-main
          context:
            - release
            - bot-check
            - pcu-app
          target_branch: "main"
          pcu_from_merge: --from-merge
          update_pcu: << pipeline.parameters.update_pcu >>

      - check_iac_changes:
          context:
            - release
