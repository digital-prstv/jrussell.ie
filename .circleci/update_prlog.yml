version: 2.1

parameters:
  update_pcu:
    type: boolean
    default: false
    description: "If true, pcu is updated from its main github branch before running."

orbs:
  toolkit: digital-prstv/circleci-toolkit@6.0.0
  aws-cli: circleci/aws-cli@5.4.1
  terraform: circleci/terraform@3.7.0

jobs:
  check_iac_changes:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Detect IaC changes in merge — halt if none
          command: |
            set -eo pipefail
            echo "Checking for IaC changes..."
            exit_code=0
            git diff HEAD^ HEAD -- iac/ > /tmp/iac-diff.txt 2>/tmp/iac-diff-err.txt || exit_code=$?
            if [ -s /tmp/iac-diff-err.txt ]; then
              echo "git diff stderr:"
              cat /tmp/iac-diff-err.txt
            fi
            echo "exit=${exit_code}"
            if [ -s /tmp/iac-diff.txt ]; then
              echo "IaC changes detected — proceeding with deploy"
            else
              echo "No IaC changes — halting deploy workflow"
              circleci-agent step halt
            fi

  authorise_aws:
    executor: aws-cli/default
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: arn:aws:iam::086010417807:role/CircleCI-Digital-PRSTV
          region: eu-west-1
      - persist_to_workspace:
          root: /home/circleci/
          paths:
            - .aws

  plan-01-remote:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/01-remote
          backend_config_file: ../remote.config

  plan-10-static:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/10-static
          backend_config_file: ../remote.config

  plan-20-network:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/20-network
          backend_config_file: ../remote.config

  plan-21-site-cert:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/21-site-cert
          backend_config_file: ../remote.config

  plan-22-sec-headers:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/22-sec-headers
          backend_config_file: ../remote.config

  plan-30-edge:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/plan:
          path: ./iac/30-edge
          backend_config_file: ../remote.config

  apply-01-remote:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/apply:
          path: ./iac/01-remote
          backend_config_file: ../remote.config

  apply-10-static:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/apply:
          path: ./iac/10-static
          backend_config_file: ../remote.config

  apply-20-network:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/apply:
          path: ./iac/20-network
          backend_config_file: ../remote.config

  apply-21-site-cert:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/apply:
          path: ./iac/21-site-cert
          backend_config_file: ../remote.config

  apply-22-sec-headers:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - run: zip -j ./iac/22-sec-headers/javascript.zip ./iac/22-sec-headers/index.js
      - terraform/apply:
          path: ./iac/22-sec-headers
          backend_config_file: ../remote.config

  apply-30-edge:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci/
      - terraform/install
      - terraform/apply:
          path: ./iac/30-edge
          backend_config_file: ../remote.config

workflows:
  update_prlog:
    jobs:
      - toolkit/update_prlog:
          name: update-prlog-on-main
          context:
            - release
            - bot-check
            - pcu-app
          target_branch: "main"
          pcu_from_merge: --from-merge
          update_pcu: << pipeline.parameters.update_pcu >>

  deploy_iac_on_merge:
    jobs:
      - check_iac_changes

      - authorise_aws:
          context:
            - AWS-DEV
          requires:
            - check_iac_changes

      - plan-01-remote:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - plan-10-static:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - plan-20-network:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - plan-21-site-cert:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - plan-22-sec-headers:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - plan-30-edge:
          context:
            - AWS-DEV
          requires:
            - authorise_aws

      - approve-iac-deploy:
          type: approval
          requires:
            - plan-01-remote
            - plan-10-static
            - plan-20-network
            - plan-21-site-cert
            - plan-22-sec-headers
            - plan-30-edge

      - apply-01-remote:
          context:
            - AWS-DEV
          requires:
            - approve-iac-deploy

      - apply-10-static:
          context:
            - AWS-DEV
          requires:
            - apply-01-remote

      - apply-20-network:
          context:
            - AWS-DEV
          requires:
            - apply-01-remote

      - apply-21-site-cert:
          context:
            - AWS-DEV
          requires:
            - apply-20-network

      - apply-22-sec-headers:
          context:
            - AWS-DEV
          requires:
            - apply-01-remote

      - apply-30-edge:
          context:
            - AWS-DEV
          requires:
            - apply-10-static
            - apply-21-site-cert
            - apply-22-sec-headers
