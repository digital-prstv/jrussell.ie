version: 2.1

parameters:
  update_pcu:
    type: boolean
    default: false
    description: "If true, pcu is updated from its main github branch before running."

orbs:
  toolkit: digital-prstv/circleci-toolkit@6.6.0

jobs:
  check_iac_changes:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Switch to main
          command: |
            git fetch origin main
            git checkout main
      - run:
          name: Detect IaC changes — trigger deploy pipeline if found
          command: |
            set -eo pipefail
            if git diff HEAD^ HEAD -- iac/ | grep -q .; then
              echo "IaC changes detected — triggering deploy pipeline"
              curl -s -X POST "${DEPLOY_IAC_WEBHOOK}"
            else
              echo "No IaC changes — skipping deploy"
            fi

workflows:
  update_prlog:
    jobs:
      - toolkit/update_prlog:
          name: update-prlog-on-main
          context:
            - release
            - bot-check
            - pcu-app
          target_branch: "main"
          pcu_from_merge: --from-merge
          update_pcu: << pipeline.parameters.update_pcu >>

      - check_iac_changes:
          context:
            - release
