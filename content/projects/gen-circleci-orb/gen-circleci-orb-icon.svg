<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0f9ff" stroke="#bae6fd" stroke-width="2"/>

  <!-- CLI terminal (left): the help-text source -->
  <rect x="30" y="72" width="56" height="56" rx="7" fill="#0ea5e9"/>
  <!-- window controls -->
  <circle cx="41" cy="81" r="2.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="50" cy="81" r="2.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="59" cy="81" r="2.5" fill="#ffffff" opacity="0.6"/>
  <line x1="30" y1="89" x2="86" y2="89" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <!-- prompt chevron + cursor -->
  <path d="M 41 99 L 49 106 L 41 113" fill="none" stroke="#ffffff" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="54" y1="113" x2="66" y2="113" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow -->
  <path d="M 96 100 L 112 100" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <path d="M 107 94 L 114 100 L 107 106" fill="none" stroke="#64748b" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Orb (right): the generated CircleCI orb -->
  <circle cx="150" cy="100" r="26" fill="#0891b2"/>
  <ellipse cx="150" cy="100" rx="18" ry="26" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.35"/>
  <ellipse cx="150" cy="100" rx="26" ry="15" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.35"/>
</svg>
