# Build the Zola site and deploy it to GitHub Pages.
#
# base_url comes from config.toml ("https://www.jrussell.ie"), the canonical
# source of truth. We deliberately do NOT pass --base-url from
# actions/configure-pages: it reports the domain as http:// (GitHub "Enforce
# HTTPS" is off because HTTPS is terminated by Cloudflare, not GitHub), which
# would bake http:// into every canonical/og:url/sitemap/feed URL.
name: Deploy site to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ZOLA_VERSION: "0.19.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with tabi theme submodule)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Zola ${{ env.ZOLA_VERSION }}
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz
          sudo mv zola /usr/local/bin/zola
          zola --version

      - name: Build
        run: zola build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
