# Build the Zola site and deploy it to GitHub Pages.
#
# base_url is taken from actions/configure-pages, NOT hard-coded, so the build
# always matches the actual serving origin:
#   Phase 1 (no custom domain): https://digital-prstv.github.io/jrussell.ie
#   Phase 2 (custom domain set in Settings -> Pages): https://www.jrussell.ie
# This prevents cross-origin asset links being blocked by the site's own CSP.
#
name: Deploy site to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ZOLA_VERSION: "0.19.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with tabi theme submodule)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Zola ${{ env.ZOLA_VERSION }}
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz
          sudo mv zola /usr/local/bin/zola
          zola --version

      - name: Build
        run: zola build --base-url "${{ steps.pages.outputs.base_url }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
